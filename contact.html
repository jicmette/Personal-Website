<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/medium.css">
    <link rel="stylesheet" href="styles/large.css">
    <link rel="icon" type="image/jpg" href="images/favicon-32x32.png" />
    <title>Contact</title>
  </head>

  <body>
    <header>
      <a id="logo" href="index.html">
        <img src="images/ilogo.png" alt="Logo Israel Carmona" />
      </a>

      <div id="myNav" class="overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()"
          >&times;</a
        >
        <div class="overlay-content">
          <a href="./">Home</a>
          <a href="portfolio.html">Portfolio</a>
          <a href="contact.html">Contact</a>
        </div>
        <div class="overlay-links">
          <a href="links.html" target="_blank">Links</a>
        </div>
      </div>
      <span id="kmore" onclick="openNav()">&#9776;</span>
    </header>

      <!--MAIN CONTENT-->
      <main>
        <div class="containermywork">
          <h1 class="greathone">Contact.</h1>
          <h1 class="h1mywork">Contact.</h1>
        </div>

        <div class="containercontact">
          <p class="pcontact">
            I'm searching for any new opportunity, my inbox is always open, contact me! 
          </p>

          <div class="formarea">
            <form class="form1" action="/my-handling-form-page" method="post">
              <input
                type="text"
                id="name"
                name="user_name"
                placeholder="Name"
              />

              <input
                type="email"
                id="mail"
                name="user_email"
                placeholder="Email"
              />

              <textarea
                id="msg"
                name="user_message"
                placeholder="Message"
              ></textarea>

              <button
                class="button"
                onclick="messagesent_alert()"
                type="submit"
              >
                Submit
              </button>
            </form>
          </div>

          <div class=""></div>
          <img class="imgmap" src="images/map2.jpg" alt="map" />
        </div>
      </main>

      <!--FOOTER-->
      <footer>
        <p class="pfoot">.</p>
        
        <div class="contact">
          <a href="https://github.com/jicmette" target="blank">
            <img
              class="imgfoot"
              src="images/github-mark-white.png"
              alt="GitHub"
            />
          </a>
          <a href="https://www.linkedin.com/in/jicmette/" target="blank">
            <img
              class="imgfoot"
              src="images/LI-In-Bugwhite.png"
              alt="linkedin"
            />
          </a>
          <a href="mailto:jicmettesc@gmail.com" target="blank">
            <img
              class="imgfoot"
              src="images/Email-Symbol-PNG-File.png"
              alt="Email"
            />
          </a>
        </div>
        <p class="pfoot">Designed and Built by Israel Carmona</p>
        <p class="pfoot">&copy; <span class="currentYear"></span></p>
      </footer>

    <script src="scripts/scripts.js"></script>
    
  </body>
</html>
